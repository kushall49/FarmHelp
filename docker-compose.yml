  #   image: mongo:6
  #   container_name: farmhelp-mongodb
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
  #     - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
  #     - MONGO_INITDB_DATABASE=farmmate
  #   volumes:
  #     - mongodb-data:/data/db
  #     - mongodb-config:/data/configdb
  #   networks:
  #     - farmhelp-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s

# Volumes for data persistence
volumes:
  ml-models:
    driver: local
  ml-logs:
    driver: local
  ml-uploads:
    driver: local
  backend-uploads:
    driver: local
  backend-logs:
    driver: local
  confirmed-data:
    driver: local
  # mongodb-data:
  #   driver: local
  # mongodb-config:
  #   driver: local

# Network for inter-service communication
networks:
  farmhelp-network:
    driver: bridge
